<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CerberAI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --bg-input: #1a1a25;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #27272a;
            --success: #22c55e;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        
        /* Левая панель */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        
        .sidebar-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .new-chat-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        
        .new-chat-btn:hover {
            background: var(--border);
            border-color: var(--text-muted);
        }
        
        .plus-icon {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }
        
        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chat-item:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        
        .chat-icon {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }
        
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-align: center;
        }
        
        .btn-login {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-login:hover {
            background: var(--bg-input);
        }
        
        .btn-register {
            background: var(--accent);
            color: white;
        }
        
        .btn-register:hover {
            background: var(--accent-hover);
        }
        
        /* Кнопка меню для мобильных */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s;
        }
        
        /* Оверлей для мобильных */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        
        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }
        
        .content-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        /* Заголовок */
        .main-title {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-align: center;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 8px;
            text-align: center;
        }
        
        /* Область ввода */
        .input-container {
            width: 100%;
            max-width: 700px;
            position: relative;
        }
        
        .input-wrapper {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 4px 24px rgba(99, 102, 241, 0.15);
        }
        
        .attach-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .attach-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 24px;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 200px;
            font-family: inherit;
        }
        
        .input-field::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--text-muted);
            color: var(--bg-dark);
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .send-btn.active {
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255,255,255,0.3);
        }
        
        .send-btn.active:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255,255,255,0.4);
        }
        
        .send-icon {
            width: 18px;
            height: 18px;
            margin-left: 2px;
        }
        
        /* Подсказки */
        .suggestions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .suggestion-chip {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: var(--bg-panel);
        }
        
        /* Статус */
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-overlay.active {
                display: block;
            }
            
            .menu-toggle {
                display: flex;
            }
            
            .main-content {
                padding: 80px 20px 40px;
            }
            
            .main-title {
                font-size: 36px;
            }
            
            .content-wrapper {
                gap: 30px;
            }
            
            .input-wrapper {
                padding: 12px 16px;
            }
            
            .close-sidebar {
                display: flex !important;
            }
        }
        
        /* Кнопка закрытия сайдбара на мобильных */
        .close-sidebar {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
        }
        
        .close-sidebar:hover {
            color: var(--text-primary);
        }
        
        /* Чат (скрыт изначально) */
        .chat-container {
            display: none;
            width: 100%;
            max-width: 800px;
            height: 100%;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot {
            align-self: flex-start;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .dev-indicator {
            display: inline-block;
            background: #ffd700;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Кнопка меню для мобильных -->
    <button class="menu-toggle" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- Оверлей -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <!-- Левая панель -->
    <aside class="sidebar" id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        
        <div class="sidebar-header">
            <div class="logo-icon">C</div>
            <span class="sidebar-title">CerberAI</span>
        </div>
        
        <button class="new-chat-btn" onclick="newChat()">
            <svg class="plus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Новый чат
        </button>
        
        <div class="section-label">Все чаты</div>
        <div class="chats-list" id="chatsList">
            <!-- Чаты будут здесь -->
            <div class="chat-item">
                <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Первый разговор
            </div>
        </div>
        
        <div class="auth-buttons">
            <button class="btn btn-login">Войти</button>
            <button class="btn btn-register">Зарегистрироваться</button>
        </div>
    </aside>
    
    <!-- Основной контент -->
    <main class="main-content">
        <!-- Экран приветствия -->
        <div class="content-wrapper" id="welcomeScreen">
            <div>
                <h1 class="main-title">CerberAI</h1>
                <p class="subtitle">Твой персональный AI с памятью</p>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="attach-btn" title="Прикрепить файл">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="Напиши свой вопрос!" 
                        rows="1"
                        oninput="handleInput(this)"
                        onkeypress="handleKeyPress(event)"
                    ></textarea>
                    
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
                
                <div class="suggestions">
                    <span class="suggestion-chip" onclick="setInput('Расскажи о себе')">Расскажи о себе</span>
                    <span class="suggestion-chip" onclick="setInput('Помоги с кодом')">Помоги с кодом</span>
                    <span class="suggestion-chip" onclick="setInput('Объясни простыми словами')">Объясни простыми словами</span>
                </div>
            </div>
        </div>
        
        <!-- Экран чата (скрыт) -->
        <div class="chat-container" id="chatScreen">
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="input-container" style="margin-top: 20px;">
                <div class="input-wrapper">
                    <button class="attach-btn" title="Прикрепить файл">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    
                    <textarea 
                        class="input-field" 
                        id="chatInput" 
                        placeholder="Напиши сообщение..." 
                        rows="1"
                        oninput="handleInput(this)"
                        onkeypress="handleKeyPress(event)"
                    ></textarea>
                    
                    <button class="send-btn" id="chatSendBtn" onclick="sendChatMessage()">
                        <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            <span class="status-dot"></span>
            <span>CerberAI готов к работе</span>
        </div>
    </main>
    
    <script>
        let history = [];
        let devMode = false;
        
        // Управление сайдбаром на мобильных
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        // Авто-ресайз textarea
        function handleInput(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            
            // Активация кнопки отправки
            const sendBtn = textarea.id === 'messageInput' ? 
                document.getElementById('sendBtn') : 
                document.getElementById('chatSendBtn');
            
            if (textarea.value.trim().length > 0) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        }
        
        // Enter для отправки, Shift+Enter для новой строки
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (document.getElementById('welcomeScreen').style.display !== 'none') {
                    sendMessage();
                } else {
                    sendChatMessage();
                }
            }
        }
        
        // Быстрый ввод из чипов
        function setInput(text) {
            const input = document.getElementById('messageInput');
            input.value = text;
            handleInput(input);
            input.focus();
        }
        
        // Новый чат
        function newChat() {
            history = [];
            devMode = false;
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('messageInput').value = '';
            handleInput(document.getElementById('messageInput'));
            
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }
        
        // Отправка первого сообщения
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Переключаемся на экран чата
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            
            // Добавляем сообщение в чат
            addMessage(message, 'user');
            input.value = '';
            handleInput(input);
            
            // Получаем ответ
            await getBotResponse(message);
        }
        
        // Отправка в чате
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            handleInput(input);
            
            await getBotResponse(message);
        }
        
        // Добавление сообщения в чат
        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            if (sender === 'bot' && devMode) {
                div.innerHTML = '<span class="dev-indicator">DEV</span>' + escapeHtml(text);
            } else {
                div.textContent = text;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // Получение ответа от бота
        async function getBotResponse(message) {
            // Показываем индикатор загрузки
            const loading = document.createElement('div');
            loading.className = 'message bot';
            loading.innerHTML = '<span style="opacity: 0.5;">Печатает...</span>';
            loading.id = 'loading';
            document.getElementById('chatMessages').appendChild(loading);
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message, history: history})
                });
                
                const data = await response.json();
                
                // Удаляем индикатор
                document.getElementById('loading').remove();
                
                // Обновляем режим разработчика
                if (data.dev_mode !== devMode) {
                    devMode = data.dev_mode;
                }
                
                // Показываем ответ
                addMessage(data.response, 'bot');
                
                // Обновляем историю
                history.push({role: 'user', content: message});
                history.push({role: 'assistant', content: data.response});
                if (history.length > 20) history = history.slice(-20);
                
            } catch (error) {
                document.getElementById('loading').remove();
                addMessage('Ошибка соединения. Проверь, запущен ли сервер.', 'bot');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
